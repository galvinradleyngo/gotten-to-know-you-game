<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gotten to Know You Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading">
            <div>
                <h1>🎮 Gotten to Know You!</h1>
                <p>Loading game...</p>
            </div>
        </div>
    </div>

    <script>
        // Test if basic JavaScript works
        console.log('JavaScript is working!');
        
        // Simple game without React - just vanilla JavaScript
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded');
            
            const app = document.getElementById('app');
            
            // Firebase config
            const firebaseConfig = {
                databaseURL: "https://gotten-to-know-you-default-rtdb.asia-southeast1.firebasedatabase.app"
            };
            
            // Game state
            let gameState = 'menu';
            let gameCode = '';
            let playerName = '';
            let playerFact = '';
            let currentGame = null;
            let players = [];
            
            // Utility functions
            function generateGameCode() {
                return Math.random().toString(36).substr(2, 6).toUpperCase();
            }
            
            function saveToFirebase(code, data) {
                return fetch(`${firebaseConfig.databaseURL}/games/${code}.json`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                }).catch(err => {
                    console.log('Firebase failed, using localStorage');
                    localStorage.setItem('game-' + code, JSON.stringify(data));
                });
            }
            
            function loadFromFirebase(code) {
                return fetch(`${firebaseConfig.databaseURL}/games/${code}.json`)
                    .then(response => response.json())
                    .catch(err => {
                        console.log('Firebase failed, trying localStorage');
                        const saved = localStorage.getItem('game-' + code);
                        return saved ? JSON.parse(saved) : null;
                    });
            }
            
            // Render functions
            function renderMenu() {
                app.innerHTML = `
                    <div class="min-h-screen bg-gradient-to-br from-purple-600 via-pink-600 to-blue-600 flex items-center justify-center p-4">
                        <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full text-center">
                            <div class="mb-8">
                                <div class="bg-gradient-to-r from-purple-500 to-pink-500 rounded-full w-20 h-20 flex items-center justify-center mx-auto mb-4 text-4xl">
                                    👥
                                </div>
                                <h1 class="text-3xl font-bold text-gray-800 mb-2">Gotten to Know You!</h1>
                                <p class="text-gray-600">A fun classroom game to learn about each other</p>
                            </div>
                            
                            <div class="space-y-4">
                                <button id="teacher-btn" class="w-full bg-gradient-to-r from-blue-500 to-purple-500 hover:from-blue-600 hover:to-purple-600 text-white font-semibold py-4 px-6 rounded-2xl transition-all duration-300 transform hover:scale-105 shadow-lg">
                                    ▶️ I'm a Teacher
                                </button>
                                
                                <button id="student-btn" class="w-full bg-gradient-to-r from-green-500 to-teal-500 hover:from-green-600 hover:to-teal-600 text-white font-semibold py-4 px-6 rounded-2xl transition-all duration-300 transform hover:scale-105 shadow-lg">
                                    👤 I'm a Student
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                
                document.getElementById('teacher-btn').onclick = () => {
                    gameState = 'teacher-setup';
                    renderTeacherSetup();
                };
                
                document.getElementById('student-btn').onclick = () => {
                    gameState = 'student-join';
                    renderStudentJoin();
                };
            }
            
            function renderTeacherSetup() {
                app.innerHTML = `
                    <div class="min-h-screen bg-gradient-to-br from-blue-600 via-purple-600 to-pink-600 flex items-center justify-center p-4">
                        <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full text-center">
                            <h2 class="text-2xl font-bold text-gray-800 mb-6">Create New Game</h2>
                            <p class="text-gray-600 mb-8">Click the button below to create a new game and get your game code!</p>
                            
                            <button id="create-btn" class="w-full bg-gradient-to-r from-blue-500 to-purple-500 hover:from-blue-600 hover:to-purple-600 text-white font-semibold py-4 px-6 rounded-2xl transition-all duration-300 transform hover:scale-105 shadow-lg mb-4">
                                Create Game
                            </button>
                            
                            <button id="back-btn" class="w-full bg-gray-300 hover:bg-gray-400 text-gray-700 font-semibold py-3 px-6 rounded-2xl transition-all duration-300">
                                Back to Menu
                            </button>
                        </div>
                    </div>
                `;
                
                document.getElementById('create-btn').onclick = async () => {
                    gameCode = generateGameCode();
                    currentGame = {
                        code: gameCode,
                        players: [],
                        isStarted: false,
                        createdAt: new Date().toISOString()
                    };
                    
                    await saveToFirebase(gameCode, currentGame);
                    gameState = 'teacher-dashboard';
                    renderTeacherDashboard();
                };
                
                document.getElementById('back-btn').onclick = () => {
                    gameState = 'menu';
                    renderMenu();
                };
            }
            
            function renderTeacherDashboard() {
                app.innerHTML = `
                    <div class="min-h-screen bg-gradient-to-br from-blue-600 via-purple-600 to-pink-600 p-4">
                        <div class="max-w-4xl mx-auto">
                            <div class="bg-white rounded-3xl shadow-2xl p-8">
                                <div class="text-center mb-8">
                                    <h2 class="text-3xl font-bold text-gray-800 mb-2">Teacher Dashboard</h2>
                                    <div class="bg-gradient-to-r from-yellow-400 to-orange-500 text-white px-6 py-3 rounded-2xl inline-block text-xl font-bold">
                                        Game Code: ${gameCode}
                                    </div>
                                    
                                    <div class="mt-4 bg-blue-100 border border-blue-400 text-blue-800 px-4 py-3 rounded-2xl">
                                        <strong>📱 Students join at: ${window.location.host}</strong>
                                        <br />
                                        <div class="mt-2">
                                            <button id="copy-instructions" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg font-semibold mr-2">
                                                📋 Copy Instructions
                                            </button>
                                            <button id="show-qr" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg font-semibold">
                                                📱 Show QR Info
                                            </button>
                                        </div>
                                        <div id="qr-section" class="mt-4 hidden">
                                            <div class="bg-white p-4 rounded border">
                                                <p class="text-sm text-gray-700 mb-2">🔗 Share this link:</p>
                                                <div class="bg-gray-100 p-2 rounded text-xs break-all">${window.location.href}?game=${btoa(JSON.stringify(currentGame))}</div>
                                                <button id="copy-link" class="mt-2 bg-purple-500 text-white px-3 py-1 rounded text-sm">Copy Link</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="mb-8">
                                    <h3 class="text-xl font-semibold text-gray-700 mb-4">Players (<span id="player-count">0</span>)</h3>
                                    <div id="players-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                                </div>
                                
                                <div class="text-center space-y-4">
                                    <button id="start-game" class="bg-gradient-to-r from-green-500 to-teal-500 hover:from-green-600 hover:to-teal-600 text-white font-semibold py-4 px-8 rounded-2xl transition-all duration-300 transform hover:scale-105 shadow-lg" disabled>
                                        Start Game (Need 2+ Players)
                                    </button>
                                    
                                    <br>
                                    <button id="back-menu" class="bg-gray-300 hover:bg-gray-400 text-gray-700 font-semibold py-3 px-6 rounded-2xl transition-all duration-300">
                                        Back to Menu
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                
                // Event listeners
                document.getElementById('copy-instructions').onclick = () => {
                    const message = `🎮 Join our class game!\n\n1. Go to: ${window.location.host}\n2. Click "I'm a Student"\n3. Enter code: ${gameCode}`;
                    navigator.clipboard.writeText(message);
                    alert('✅ Instructions copied!');
                };
                
                document.getElementById('show-qr').onclick = () => {
                    const qrSection = document.getElementById('qr-section');
                    qrSection.classList.toggle('hidden');
                };
                
                document.getElementById('copy-link').onclick = () => {
                    const link = `${window.location.href}?game=${btoa(JSON.stringify(currentGame))}`;
                    navigator.clipboard.writeText(link);
                    alert('✅ Link copied!');
                };
                
                document.getElementById('back-menu').onclick = () => {
                    gameState = 'menu';
                    renderMenu();
                };
                
                // Poll for players
                pollForPlayers();
            }
            
            function renderStudentJoin() {
                app.innerHTML = `
                    <div class="min-h-screen bg-gradient-to-br from-green-600 via-teal-600 to-blue-600 flex items-center justify-center p-4">
                        <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full text-center">
                            <h2 class="text-2xl font-bold text-gray-800 mb-6">Join Game</h2>
                            
                            <div class="space-y-6">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Game Code</label>
                                    <input type="text" id="game-code-input" placeholder="Enter game code" class="w-full px-4 py-3 border-2 border-gray-300 rounded-2xl focus:border-blue-500 focus:outline-none text-center text-lg font-semibold" maxlength="6">
                                </div>
                                
                                <button id="join-btn" class="w-full bg-gradient-to-r from-green-500 to-teal-500 hover:from-green-600 hover:to-teal-600 text-white font-semibold py-4 px-6 rounded-2xl transition-all duration-300 transform hover:scale-105 shadow-lg">
                                    Join Game
                                </button>
                                
                                <div id="error-msg" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-2xl"></div>
                            </div>
                            
                            <button id="back-btn2" class="w-full bg-gray-300 hover:bg-gray-400 text-gray-700 font-semibold py-3 px-6 rounded-2xl transition-all duration-300 mt-4">
                                Back to Menu
                            </button>
                        </div>
                    </div>
                `;
                
                document.getElementById('join-btn').onclick = async () => {
                    const code = document.getElementById('game-code-input').value.toUpperCase();
                    if (!code) {
                        showError('Please enter a game code');
                        return;
                    }
                    
                    const game = await loadFromFirebase(code);
                    if (!game) {
                        showError('Game not found! Please check the code.');
                        return;
                    }
                    
                    gameCode = code;
                    currentGame = game;
                    gameState = 'student-submit';
                    renderStudentSubmit();
                };
                
                document.getElementById('back-btn2').onclick = () => {
                    gameState = 'menu';
                    renderMenu();
                };
            }
            
            function renderStudentSubmit() {
                app.innerHTML = `
                    <div class="min-h-screen bg-gradient-to-br from-green-600 via-teal-600 to-blue-600 flex items-center justify-center p-4">
                        <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full">
                            <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Submit Your Info</h2>
                            
                            <div class="space-y-6">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Your Name</label>
                                    <input type="text" id="player-name" placeholder="Enter your name" class="w-full px-4 py-3 border-2 border-gray-300 rounded-2xl focus:border-blue-500 focus:outline-none" maxlength="30">
                                </div>
                                
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Fun Fact About You</label>
                                    <textarea id="player-fact" placeholder="Share something interesting about yourself..." class="w-full px-4 py-3 border-2 border-gray-300 rounded-2xl focus:border-blue-500 focus:outline-none resize-none h-24" maxlength="150"></textarea>
                                    <p class="text-sm text-gray-500 mt-1"><span id="char-count">0</span>/150</p>
                                </div>
                                
                                <button id="submit-btn" class="w-full bg-gradient-to-r from-green-500 to-teal-500 hover:from-green-600 hover:to-teal-600 text-white font-semibold py-4 px-6 rounded-2xl transition-all duration-300 transform hover:scale-105 shadow-lg">
                                    Submit
                                </button>
                                
                                <div id="error-msg2" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-2xl"></div>
                            </div>
                        </div>
                    </div>
                `;
                
                document.getElementById('player-fact').oninput = (e) => {
                    document.getElementById('char-count').textContent = e.target.value.length;
                };
                
                document.getElementById('submit-btn').onclick = async () => {
                    const name = document.getElementById('player-name').value.trim();
                    const fact = document.getElementById('player-fact').value.trim();
                    
                    if (!name || !fact) {
                        showError2('Please fill in both your name and fact!');
                        return;
                    }
                    
                    // Add player to game
                    currentGame.players = currentGame.players || [];
                    currentGame.players.push({
                        id: Date.now(),
                        name: name,
                        fact: fact
                    });
                    
                    await saveToFirebase(gameCode, currentGame);
                    
                    // Show success
                    app.innerHTML = `
                        <div class="min-h-screen bg-gradient-to-br from-green-600 via-teal-600 to-blue-600 flex items-center justify-center p-4">
                            <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full text-center">
                                <div class="text-6xl mb-4">✅</div>
                                <h2 class="text-2xl font-bold text-gray-800 mb-4">Successfully Joined!</h2>
                                <p class="text-gray-600 mb-4">Hi ${name}! Waiting for the teacher to start the game...</p>
                                <p class="text-sm text-gray-500">Game will start automatically when teacher begins</p>
                            </div>
                        </div>
                    `;
                };
            }
            
            function pollForPlayers() {
                setInterval(async () => {
                    if (gameState === 'teacher-dashboard' && gameCode) {
                        const game = await loadFromFirebase(gameCode);
                        if (game && game.players) {
                            currentGame = game;
                            updatePlayersList(game.players);
                        }
                    }
                }, 2000);
            }
            
            function updatePlayersList(players) {
                const playersList = document.getElementById('players-list');
                const playerCount = document.getElementById('player-count');
                const startBtn = document.getElementById('start-game');
                
                if (playersList) {
                    playerCount.textContent = players.length;
                    playersList.innerHTML = players.map(player => `
                        <div class="bg-gradient-to-r from-green-100 to-blue-100 p-4 rounded-2xl border-2 border-green-200">
                            <div class="flex items-center">
                                <span class="mr-3 text-xl">✅</span>
                                <div>
                                    <p class="font-semibold text-gray-800">${player.name}</p>
                                    <p class="text-sm text-gray-600">✓ Fact submitted</p>
                                </div>
                            </div>
                        </div>
                    `).join('');
                    
                    if (startBtn) {
                        if (players.length >= 2) {
                            startBtn.disabled = false;
                            startBtn.textContent = 'Start Game!';
                            startBtn.onclick = () => alert('Game starting! (Demo version)');
                        } else {
                            startBtn.disabled = true;
                            startBtn.textContent = `Start Game (Need ${2 - players.length} more players)`;
                        }
                    }
                }
            }
            
            function showError(msg) {
                const errorDiv = document.getElementById('error-msg');
                errorDiv.textContent = msg;
                errorDiv.classList.remove('hidden');
            }
            
            function showError2(msg) {
                const errorDiv = document.getElementById('error-msg2');
                errorDiv.textContent = msg;
                errorDiv.classList.remove('hidden');
            }
            
            // Check for game URL parameter
            const urlParams = new URLSearchParams(window.location.search);
            const gameParam = urlParams.get('game');
            if (gameParam) {
                try {
                    currentGame = JSON.parse(atob(gameParam));
                    gameCode = currentGame.code;
                    gameState = 'student-submit';
                    renderStudentSubmit();
                    return;
                } catch (e) {
                    console.error('Invalid game URL');
                }
            }
            
            // Start with menu
            renderMenu();
        });
    </script>
</body>
</html>
